<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alumnos</title>
</head>
<body>
<h1>Alumnos</h1>
<table border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>NOMBRES</th>
        <th>APELLIDOS</th>
        <th>DIRECCION</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${lista}">
        <td th:text="${a.id}"></td>
        <td th:text="${a.nombres}"></td>
        <td th:text="${a.apellidos}"></td>
        <td th:text="${a.direccion}"></td>
    </tr>
    </tbody>
</table>

</body>
</html>
